<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindhya Banda | Redirecting...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FBF7FF;
            color: #333;
            text-align: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 460px;
            box-shadow: 0 8px 40px rgba(124, 92, 252, 0.1);
        }
        .oops {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        a.btn {
            display: inline-block;
            padding: 12px 32px;
            background: #7C5CFC;
            color: #fff;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }
        a.btn:hover {
            background: #5a3de6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 92, 252, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="oops">Oops! My website has moved.</p>
        <p>It's now at <strong>vindhyabanda.github.io</strong></p>
        <a class="btn" href="https://vindhyabanda.github.io/">Take Me There</a>
    </div>
</body>
</html>
